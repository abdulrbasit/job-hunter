# Job Hunter configuration — example workspace (fictional persona: John Doe)
# All values below are examples. Replace with your own.

mode: agent

profile:
  resume_tex: "profile/resume_double_column.tex"
  story_bank: "profile/story_bank.md"
  career_context: "profile/career_context.md"
  latex_class: "profile/altacv.cls"
  profile_image: "profile/profile.png"

job_titles:
  - "Staff Engineer"
  - "Staff Backend Engineer"
  - "Senior Backend Engineer"
  - "Principal Engineer"
  - "Senior Software Engineer"

regions:
  hamburg:
    enabled: true
    primary: true
    country: "DE"
    search_lang: "en"
    location: "Hamburg"
    description: "Hamburg and greater area"
  remote:
    enabled: true
    country: "DE"
    search_lang: "en"
    location: "Remote"
    description: "Remote-first roles open to Germany"

exclusions:
  companies: []
  languages:
    - german
  industries: []

scoring:
  min_fit_score: 70
  max_years_experience_required: 10
  batch_size: 15
  strategic_overrides:
    - company: "NordPay Systems"
      min_score_override: 55
      bypass_max_years_experience: true
      reason: "Former colleague now CTO — genuine technical fit"
    - company: "Tributary"
      min_score_override: 60
      bypass_max_years_experience: false
      reason: "Open-source Kafka tooling — strong mission alignment"

llm:
  default_provider: anthropic
  providers:
    validation: anthropic
    scoring: anthropic
    tailoring: anthropic
    cover_letter: anthropic
    research: anthropic
    jd_extraction: anthropic
  models:
    validation: "claude-haiku-4-5-20251001"
    scoring: "claude-haiku-4-5-20251001"
    tailoring: "claude-sonnet-4-6"
    cover_letter: "claude-sonnet-4-6"
    research: "claude-haiku-4-5-20251001"
    jd_extraction: "claude-haiku-4-5-20251001"
  max_tokens:
    validation: 200
    scoring: 1000
    tailoring: 4000
    cover_letter: 800
    research: 800
    jd_extraction: 1500
  max_workers: 5
  rate_limits: {}
