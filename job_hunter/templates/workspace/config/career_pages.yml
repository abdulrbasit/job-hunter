# Company career pages for the browser hunt workflow.
# Add companies here, then run it from the dashboard's Company Hunt tab.
#
# Fields:
#   name        Company name
#   career_url  URL of the company's careers page
#   location    Optional location hint, e.g. "Berlin"

companies: []

# Example:
# companies:
#   - name: "Stripe"
#     career_url: "https://stripe.com/jobs"
#     location: ""
#   - name: "N26"
#     career_url: "https://n26.com/en/careers"
#     location: "Berlin"

# Optional: opt in to companies from the shared bundled catalog
# (job_hunter/catalog/companies.json). Catalog companies are OFF by default — pick
# individual companies or whole sectors in the dashboard's Company Hunt → Manage
# Companies → Shared Catalog tab, which writes their ids here for you. A custom
# entry above always wins if its career_url matches a catalog company.
# catalog:
#   enabled_company_ids: ["stripe", "n26"]
