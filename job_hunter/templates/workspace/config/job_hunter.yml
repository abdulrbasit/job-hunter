# Job Hunter configuration.
# YAML is for deterministic machine settings. Personal positioning, writing
# style, and career preferences belong in profile/career_context.md.

mode: agent

profile:
  resume_tex: "profile/resume_double_column.tex"
  story_bank: "profile/story_bank.md"
  career_context: "profile/career_context.md"
  latex_class: "profile/altacv.cls"
  profile_image: "profile/profile.png"

job_titles:
  - "Product Manager"
  - "Product Owner"

regions:
  primary:
    enabled: true
    primary: true
    country: "DE"
    search_lang: "en"
    location: "Your City"
    description: "Primary search region"

  # Additional regions can be added here. Country-specific sources are
  # automatically skipped when their country is not enabled.
  # singapore:
  #   enabled: false
  #   country: "SG"
  #   location: "Singapore"

exclusions:
  companies: []
  title_terms:
    - intern
    - internship
    - trainee
    - working student
    - werkstudent
    - junior
    - principal
    - expert
    - chief product
  languages:
    - german
  industries: []

search:
  llm_search:
    enabled: false
    # Run AI web search only when normal sources find fewer than this many candidates.
    trigger_threshold: 15
    # Hard cap for AI web-search candidates added in one run.
    max_results_per_run: 20

scoring:
  min_fit_score: 70
  max_years_experience_required: 5
  # Shared run batch size. Agent mode freezes this many candidates per batch;
  # LLM API mode tailors this many top-scored matches per run. Request
  # concurrency is controlled separately by llm.max_workers.
  batch_size: 15
  strategic_overrides: []
  # Example:
  # - company: "Dream Company"
  #   min_score_override: 60
  #   bypass_max_years_experience: true
  #   reason: "Strategic target"

llm:
  default_provider: anthropic
  providers:
    validation: anthropic
    scoring: anthropic
    tailoring: anthropic
    cover_letter: anthropic
    research: anthropic
    jd_extraction: anthropic
    ai_web_search: anthropic
  models:
    validation: "claude-haiku-4-5-20251001"
    scoring: "claude-haiku-4-5-20251001"
    tailoring: "claude-sonnet-4-6"
    cover_letter: "claude-sonnet-4-6"
    research: "claude-haiku-4-5-20251001"
    jd_extraction: "claude-haiku-4-5-20251001"
    ai_web_search: "claude-haiku-4-5-20251001"
  max_tokens:
    validation: 200
    scoring: 1000
    tailoring: 4000
    cover_letter: 800
    research: 800
    jd_extraction: 1500
    ai_web_search: 1200
  max_workers: 5
  rate_limits: {}
