name: Find Jobs

on:
  # Uncomment and adjust the cron lines below to enable automatic scraping.
  # schedule:
  #   - cron: "0 18 * * 0-4"   # 20:00 Berlin (CEST) / 19:00 CET - Mon-Fri
  workflow_dispatch:
    inputs:
      region:
        description: Region key from config/job_hunter.yml (leave blank for all regions)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  find-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
      BRAVE_API_KEY:    ${{ secrets.BRAVE_API_KEY }}
      TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY:      ${{ secrets.EXA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SEARXNG_BASE_URL: http://127.0.0.1:8080
      RAPIDAPI_KEY:     ${{ secrets.RAPIDAPI_KEY }}
      ADZUNA_APP_ID:    ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_API_KEY:   ${{ secrets.ADZUNA_API_KEY }}
      REED_API_KEY:     ${{ secrets.REED_API_KEY }}
      JOOBLE_API_KEY:   ${{ secrets.JOOBLE_API_KEY }}
      LOG_LEVEL:        INFO

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          ignore-nothing-to-cache: true

      - name: Install Python package and runtime extras
        run: |
          uv pip install "job-hunter-kit[llm,browser]"
          playwright install --with-deps chromium

      - name: Read execution mode
        id: mode
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import yaml
          d = yaml.safe_load(open("config/job_hunter.yml", encoding="utf-8")) or {}
          print("mode=" + d.get("mode", "agent"))
          PY

      - name: Install Lightpanda
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/lightpanda https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux
          sudo install -m 0755 /tmp/lightpanda /usr/local/bin/lightpanda
          command -v lightpanda
          echo "Lightpanda installed; nightly builds do not expose a stable --version command."

      - name: Pull texlive image
        if: steps.mode.outputs.mode == 'llm-api'
        run: docker pull texlive/texlive:latest

      - name: Resolve region for this slot
        id: region
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_REGION: ${{ github.event.inputs.region }}
        run: python -m job_hunter.pipeline.resolve_hunt_region >> $GITHUB_OUTPUT

      - name: Skip if no region for this slot
        if: steps.region.outputs.should_run != 'true'
        run: |
          echo "No region configured for this cron slot - skipping."
          exit 0

      - name: Start SearXNG
        if: steps.region.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          if ! docker run -d --name searxng \
            -p 8080:8080 \
            -v "${{ github.workspace }}/.github/searxng/settings.yml:/etc/searxng/settings.yml:ro" \
            -e SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml \
            ghcr.io/searxng/searxng:latest; then
            echo "SearXNG container failed to start - continuing with other providers"
            exit 0
          fi
          for _ in {1..30}; do
            if curl -fsS "http://127.0.0.1:8080/search?q=test&format=json" >/dev/null; then
              echo "SearXNG is ready"
              exit 0
            fi
            sleep 2
          done
          echo "SearXNG did not become ready - continuing with other providers"
          docker logs searxng || true

      - name: Scrape jobs
        id: scrape
        if: steps.region.outputs.should_run == 'true'
        timeout-minutes: 55
        run: |
          set -euo pipefail
          job-hunter hunt ${{ steps.region.outputs.arg }} | tee hunt-output.txt
          snapshot=$(sed -n 's/^snapshot_path=//p' hunt-output.txt | tail -n 1)
          count=$(sed -n 's/^candidate_count=//p' hunt-output.txt | tail -n 1)
          test -n "$snapshot"
          test -f "$snapshot"
          count=${count:-0}
          echo "### Hunt summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: ${{ steps.region.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Candidates: $count" >> "$GITHUB_STEP_SUMMARY"
          echo "- Snapshot: \`$snapshot\`" >> "$GITHUB_STEP_SUMMARY"
          echo "candidate_count=$count" >> "$GITHUB_OUTPUT"
          echo "snapshot_path=$snapshot" >> "$GITHUB_OUTPUT"
          echo "has_candidates=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Build briefing
        if: steps.mode.outputs.mode == 'agent' && steps.region.outputs.should_run == 'true' && steps.scrape.outputs.has_candidates == 'true'
        run: job-hunter brief

      - name: Stop SearXNG
        if: always() && steps.region.outputs.should_run == 'true'
        run: docker stop searxng 2>/dev/null || true

      - name: Commit results
        if: always() && steps.region.outputs.should_run == 'true'
        run: |
          git config user.name "Job Hunter"
          git config user.email "noreply@github.com"
          git add outputs/ README.md
          git diff --staged --quiet && exit 0
          git commit -m "chore(hunt): ${{ steps.region.outputs.label }} $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main || {
              git diff --name-only --diff-filter=U | while IFS= read -r f; do
                case "$f" in
                  outputs/*) git checkout --ours -- "$f" ;;
                  *) git checkout --theirs -- "$f" ;;
                esac
              done
              git add -u
              git rebase --continue || { git rebase --abort; exit 1; }
            }
          done
          echo "Push failed after 3 retries" && exit 1
