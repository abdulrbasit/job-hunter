name: LinkedIn

on:
  workflow_dispatch:
    inputs:
      action:
        description: LinkedIn pipeline to run
        type: choice
        options:
          - ideas
          - draft
          - network
          - all
        required: true
        default: all

permissions:
  contents: write

jobs:
  linkedin:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: uv pip install --system job-hunter

      - name: Configure LLM API mode
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("config/job_hunter.yml")
          data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
          data["mode"] = "llm-api"
          path.write_text(yaml.safe_dump(data, sort_keys=False, allow_unicode=True), encoding="utf-8")
          PY

      - name: Run LinkedIn pipeline
        run: job-hunter linkedin "${{ inputs.action }}"

      - name: Commit results
        run: |
          git config user.name "Job Hunter"
          git config user.email "noreply@github.com"
          for path in \
            outputs/linkedin/ \
            outputs/state/api_usage.json \
            outputs/state/dev_token_metrics.json
          do
            [ -e "$path" ] && git add --force "$path"
          done
          git diff --staged --quiet && exit 0
          git commit -m "chore(linkedin): ${{ inputs.action }} $(date -u +%Y-%m-%d)"
          git push
