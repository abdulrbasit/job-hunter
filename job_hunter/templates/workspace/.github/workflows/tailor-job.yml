name: Tailor Job

on:
  workflow_dispatch:
    inputs:
      url1:
        description: Job URL 1
        required: true
      url2:
        description: Job URL 2 (optional)
        required: false
        default: ""
      url3:
        description: Job URL 3 (optional)
        required: false
        default: ""
      url4:
        description: Job URL 4 (optional)
        required: false
        default: ""
      url5:
        description: Job URL 5 (optional)
        required: false
        default: ""
      force:
        description: Reprocess already-tracked jobs
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  tailor-job:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      RAPIDAPI_KEY:  ${{ secrets.RAPIDAPI_KEY }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
      REED_API_KEY:  ${{ secrets.REED_API_KEY }}
      JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install package and browser extra
        run: |
          uv venv --python 3.12 --clear
          uv pip install "job-hunter-kit[browser]"
          uv run --no-project playwright install --with-deps chromium
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Pull texlive image
        run: docker pull texlive/texlive:latest

      - name: Process links
        env:
          URL1: ${{ inputs.url1 }}
          URL2: ${{ inputs.url2 }}
          URL3: ${{ inputs.url3 }}
          URL4: ${{ inputs.url4 }}
          URL5: ${{ inputs.url5 }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          links="$URL1"
          for extra in "$URL2" "$URL3" "$URL4" "$URL5"; do
            [ -n "$extra" ] && links="$links,$extra"
          done
          args=(tailor --links "$links")
          if [ "$FORCE" = "true" ]; then args+=(--force); fi
          job-hunter "${args[@]}"

      - name: Commit results
        run: |
          git config user.name "Job Hunter"
          git config user.email "noreply@github.com"
          for path in \
            README.md \
            outputs/jobs/ \
            outputs/candidates/ \
            outputs/linkedin/ \
            outputs/state/jobs.db \
            outputs/state/discovered_urls.yml \
            outputs/state/agent_candidate_queue.json \
            outputs/state/api_usage.json \
            outputs/state/dev_token_metrics.json
          do
            [ -e "$path" ] && git add --force "$path"
          done
          git diff --staged --quiet || git commit -m "chore(tailor): queue links $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
