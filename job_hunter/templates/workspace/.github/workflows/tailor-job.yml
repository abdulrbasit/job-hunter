name: Tailor Job

on:
  workflow_dispatch:
    inputs:
      links:
        description: One or more job URLs (comma-separated)
        required: true
      force:
        description: Reprocess already-tracked jobs
        type: boolean
        required: false
        default: false
      execution_mode:
        description: agent writes a candidate snapshot; llm-api tailors and writes cover letter
        type: choice
        options:
          - agent
          - llm-api
        required: true
        default: agent

permissions:
  contents: write

jobs:
  tailor-job:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      RAPIDAPI_KEY:  ${{ secrets.RAPIDAPI_KEY }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
      REED_API_KEY:  ${{ secrets.REED_API_KEY }}
      JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install package and browser extra
        run: |
          uv pip install --system "job-hunter[browser]"
          playwright install --with-deps chromium

      - name: Configure execution mode
        env:
          EXECUTION_MODE: ${{ inputs.execution_mode }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          path = Path("config/job_hunter.yml")
          data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
          data["mode"] = os.environ["EXECUTION_MODE"]
          path.write_text(yaml.safe_dump(data, sort_keys=False, allow_unicode=True), encoding="utf-8")
          PY

      - name: Process links
        run: |
          args=(tailor --links "${{ inputs.links }}")
          if [ "${{ inputs.force }}" = "true" ]; then args+=(--force); fi
          job-hunter "${args[@]}"

      - name: Commit results
        run: |
          git config user.name "Job Hunter"
          git config user.email "noreply@github.com"
          for path in \
            outputs/jobs/ \
            outputs/candidates/ \
            outputs/linkedin/ \
            outputs/state/discovered_urls.yml \
            outputs/state/agent_candidate_queue.json \
            outputs/state/llm_search_queue.json \
            outputs/state/api_usage.json \
            outputs/state/dev_token_metrics.json
          do
            [ -e "$path" ] && git add --force "$path"
          done
          git diff --staged --quiet || git commit -m "chore(tailor): queue links $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
