# Job Hunter configuration.
# YAML is for deterministic machine settings. Personal positioning, writing
# style, and career preferences belong in profile/career_context.md.

mode: agent

profile:
  resume_tex: "profile/resume_double_column.tex"
  story_bank: "profile/story_bank.md"
  career_context: "profile/career_context.md"
  profile_image: "profile/profile.png"

job_titles:
  - "Product Manager"
  - "Product Owner"

regions:
  primary:
    enabled: true
    primary: true
    country: "DE"
    scope: country
    search_lang: "en" # Is this needed if hunt langugage is already there? Also if I set hunt language to en and german, what happens if I am applying to jobs in Berlin? Does it automatically apply if jd is german? What happens when I have english countries like UK in my search region too?
    description: "Primary search region" # Not really needed.

  # Additional regions can be added here. Country-specific sources are
  # automatically skipped when their country is not enabled.
  # singapore:
  #   enabled: false
  #   country: "SG"
  #   scope: city
  #   city_id: "<canonical city id — set via Settings > Regions, or job-hunter internal region-lookup --city 'Singapore'>"

filters:
  hunt_languages: [en]
  experience_levels: [associate, mid, senior]
  excluded_companies: []
  excluded_industries: []

scoring:
  min_fit_score: 70
  # Shared run batch size. Agent mode freezes this many candidates per batch;
  # LLM API mode tailors this many top-scored matches per run. Request
  # concurrency is controlled separately by llm.max_workers.
  batch_size: 15

llm:
  default_provider: anthropic
  providers:
    validation: anthropic 
    scoring: anthropic
    tailoring: anthropic
    cover_letter: anthropic
    research: anthropic
    jd_extraction: anthropic
  models:
    validation: "claude-haiku-4-5-20251001"
    scoring: "claude-haiku-4-5-20251001"
    tailoring: "claude-sonnet-4-6"
    cover_letter: "claude-sonnet-4-6"
    research: "claude-haiku-4-5-20251001"
    jd_extraction: "claude-haiku-4-5-20251001"
  max_tokens:
    validation: 200
    scoring: 1000
    tailoring: 4000
    cover_letter: 800
    research: 800
    jd_extraction: 1500
  # LLM API call concurrency only (llm-api mode). Job-board scraping concurrency is
  # separately code-owned and not configurable here.
  max_workers: 5
  # LLM API call throttling only (llm-api mode). Job-search sources have no
  # rate-limit config — none of them read this key.
  rate_limits: {}
