# Company career pages for the browser hunt workflow.
# Add companies here, then run it from the dashboard's Job Candidates → Company Hunt tab.
#
# Fields:
#   name        Company name
#   career_url  URL of the company's careers page
#   location    Optional location hint, e.g. "Berlin"

companies: []

# Example:
# companies:
#   - name: "Stripe"
#     career_url: "https://stripe.com/jobs"
#     location: ""
#   - name: "N26"
#     career_url: "https://n26.com/en/careers"
#     location: "Berlin"

# Optional: control the bundled company catalog (job_hunter/catalog/companies.json).
# Catalog companies are auto-matched to your enabled regions/industries and merged
# with the list above; a custom entry above always wins if its career_url matches
# a catalog company. Omit this block to keep the catalog fully enabled (default).
# catalog:
#   enabled: true
#   disabled_company_ids: []
