name: Release

on:
  workflow_dispatch:

jobs:
  release:
    if: github.repository == 'abdulrbasit/job-hunter' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      discussions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Verify release commit
        id: release_version
        run: |
          VERSION=$(python3 - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          SUBJECT=$(git log -1 --pretty=%s)
          if [ "$SUBJECT" != "release: v${VERSION}" ]; then
            echo "HEAD must be release: v${VERSION}; found: $SUBJECT"
            exit 1
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag already exists: v${VERSION}"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Tag release
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Announce release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          export PREV=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "")
          BODY=$(VERSION="$VERSION" PREV="$PREV" python3 scripts/release_notes.py)
          REPO_ID=$(gh api graphql \
            -f query='query{repository(owner:"abdulrbasit",name:"job-hunter"){id}}' \
            --jq '.data.repository.id')
          gh api graphql \
            -f query='mutation($r:ID!,$c:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$r,categoryId:$c,title:$t,body:$b}){discussion{url}}}' \
            -f r="$REPO_ID" \
            -f c="DIC_kwDOTCyYYs4C_yV4" \
            -f t="job-hunter-kit v${VERSION} released" \
            -f b="$BODY" \
            --jq '.data.createDiscussion.discussion.url'
